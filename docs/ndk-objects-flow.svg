<svg viewBox="0 0 1100 860" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>NDK Objects — Setup &amp; Failover Flow</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="860" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">NDK Objects — Setup &amp; Failover Flow</text>
  <text x="550" y="54" text-anchor="middle" font-size="12" fill="#64748b">Objects in application order · namespace shown on each · auto-created vs manual</text>

  <!-- ── PHASE LABEL: SETUP ── -->
  <rect x="20" y="68" width="120" height="24" rx="5" fill="#0f172a"/>
  <text x="80" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#f8fafc">① – ⑥  SETUP</text>
  <text x="200" y="84" font-size="11" fill="#64748b">apply once before the first demo run</text>

  <!-- ── CLUSTER COLUMNS ── -->

  <!-- Cluster A header -->
  <rect x="20" y="100" width="510" height="36" rx="8" fill="#1d4ed8"/>
  <text x="275" y="123" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Cluster A — nkp-wlc-a</text>

  <!-- Cluster B header -->
  <rect x="570" y="100" width="510" height="36" rx="8" fill="#15803d"/>
  <text x="825" y="123" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Cluster B — nkp-wlc-b</text>

  <!-- ── OBJECT 1: Application ── -->

  <!-- A -->
  <rect x="20" y="152" width="510" height="68" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="40" y="172" font-size="13" font-weight="700" fill="#1e3a8a">① Application</text>
  <text x="40" y="190" font-size="11" fill="#1e40af">name: scuba-sealed</text>
  <text x="40" y="206" font-size="11" fill="#1e40af">ns: miriam-scuba-sealed · selects label app.kubernetes.io/instance: scuba</text>

  <!-- B -->
  <rect x="570" y="152" width="510" height="68" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.8"/>
  <text x="590" y="172" font-size="13" font-weight="700" fill="#14532d">① Application</text>
  <text x="590" y="190" font-size="11" fill="#166534">name: scuba-sealed</text>
  <text x="590" y="206" font-size="11" fill="#166534">ns: miriam-scuba-sealed · selects label app.kubernetes.io/instance: scuba</text>

  <!-- arrows down -->
  <line x1="275" y1="220" x2="275" y2="238" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="825" y1="220" x2="825" y2="238" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── OBJECT 2: ReplicationTarget ── -->

  <!-- A -->
  <rect x="20" y="238" width="510" height="68" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="40" y="258" font-size="13" font-weight="700" fill="#1e3a8a">② ReplicationTarget</text>
  <text x="40" y="276" font-size="11" fill="#1e40af">name: repl-to-nkp-wlc-b</text>
  <text x="40" y="292" font-size="11" fill="#1e40af">ns: miriam-scuba-sealed · remoteName: remote-nkp-wlc-b · targetNS: miriam-backup-sealed</text>

  <!-- B -->
  <rect x="570" y="238" width="510" height="68" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.8"/>
  <text x="590" y="258" font-size="13" font-weight="700" fill="#14532d">② ReplicationTarget</text>
  <text x="590" y="276" font-size="11" fill="#166534">name: repl-to-nkp-wlc-a</text>
  <text x="590" y="292" font-size="11" fill="#166534">ns: miriam-scuba-sealed · remoteName: remote-nkp-wlc-a · targetNS: miriam-backup-sealed</text>

  <!-- arrows down -->
  <line x1="275" y1="306" x2="275" y2="324" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="825" y1="306" x2="825" y2="324" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── OBJECT 3: JobScheduler ── -->

  <!-- A -->
  <rect x="20" y="324" width="510" height="68" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="40" y="344" font-size="13" font-weight="700" fill="#1e3a8a">③ JobScheduler</text>
  <text x="40" y="362" font-size="11" fill="#1e40af">name: js-scuba-source</text>
  <text x="40" y="378" font-size="11" fill="#1e40af">ns: miriam-scuba-sealed · interval: 60 min</text>

  <!-- B -->
  <rect x="570" y="324" width="510" height="68" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.8"/>
  <text x="590" y="344" font-size="13" font-weight="700" fill="#14532d">③ JobScheduler</text>
  <text x="590" y="362" font-size="11" fill="#166534">name: js-scuba-target</text>
  <text x="590" y="378" font-size="11" fill="#166534">ns: miriam-scuba-sealed · interval: 60 min</text>

  <!-- arrows down -->
  <line x1="275" y1="392" x2="275" y2="410" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="825" y1="392" x2="825" y2="410" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── OBJECT 4: ProtectionPlan ── -->

  <!-- A -->
  <rect x="20" y="410" width="510" height="68" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="40" y="430" font-size="13" font-weight="700" fill="#1e3a8a">④ ProtectionPlan</text>
  <text x="40" y="448" font-size="11" fill="#1e40af">name: pp-scuba-sealed-source-to-target</text>
  <text x="40" y="464" font-size="11" fill="#1e40af">links ② + ③ · async · retains 3 snapshots</text>

  <!-- B -->
  <rect x="570" y="410" width="510" height="68" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.8"/>
  <text x="590" y="430" font-size="13" font-weight="700" fill="#14532d">④ ProtectionPlan</text>
  <text x="590" y="448" font-size="11" fill="#166534">name: pp-scuba-sealed-target-to-source</text>
  <text x="590" y="464" font-size="11" fill="#166534">links ② + ③ · async · retains 3 snapshots</text>

  <!-- arrows down -->
  <line x1="275" y1="478" x2="275" y2="496" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="825" y1="478" x2="825" y2="496" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── OBJECT 5: AppProtectionPlan ── -->

  <!-- A -->
  <rect x="20" y="496" width="510" height="68" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="40" y="516" font-size="13" font-weight="700" fill="#1e3a8a">⑤ AppProtectionPlan</text>
  <text x="40" y="534" font-size="11" fill="#1e40af">name: appplan-scuba-sealed</text>
  <text x="40" y="550" font-size="11" fill="#1e40af">links ① + ④ · triggers snapshots on schedule</text>

  <!-- B -->
  <rect x="570" y="496" width="510" height="68" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.8"/>
  <text x="590" y="516" font-size="13" font-weight="700" fill="#14532d">⑤ AppProtectionPlan</text>
  <text x="590" y="534" font-size="11" fill="#166534">name: appplan-scuba-sealed</text>
  <text x="590" y="550" font-size="11" fill="#166534">links ① + ④ · enables failback direction</text>

  <!-- ── OBJECT 6: ReferenceGrant (both clusters) ── -->
  <rect x="20" y="580" width="1060" height="68" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="550" y="600" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">⑥ ReferenceGrant — apply on BOTH clusters  ⚠️</text>
  <text x="550" y="618" text-anchor="middle" font-size="11" fill="#6d28d9">name: allow-restore-from-backup · ns: miriam-backup-sealed</text>
  <text x="550" y="634" text-anchor="middle" font-size="11" fill="#6d28d9">allows ApplicationSnapshotRestore (miriam-scuba-sealed) to read ApplicationSnapshot (miriam-backup-sealed)</text>

  <!-- ── PHASE LABEL: AUTO-CREATED ── -->
  <rect x="20" y="664" width="150" height="24" rx="5" fill="#7c3aed"/>
  <text x="95" y="680" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">AUTO-CREATED</text>
  <text x="185" y="680" font-size="11" fill="#64748b">NDK creates these automatically after ⑤ is applied</text>

  <!-- ApplicationSnapshot A -->
  <rect x="20" y="694" width="510" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="40" y="714" font-size="13" font-weight="700" fill="#5b21b6">ApplicationSnapshot (Cluster A)</text>
  <text x="40" y="732" font-size="11" fill="#6d28d9">ns: miriam-backup-sealed · created every 60 min · retains last 3</text>

  <!-- ApplicationSnapshot B -->
  <rect x="570" y="694" width="510" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="590" y="714" font-size="13" font-weight="700" fill="#5b21b6">ApplicationSnapshot (Cluster B)</text>
  <text x="590" y="732" font-size="11" fill="#6d28d9">ns: miriam-backup-sealed · replicated from Cluster A · ready for restore</text>

  <!-- replication arrow between snapshots -->
  <line x1="530" y1="722" x2="570" y2="722" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arr-purple)"/>

  <!-- ── PHASE LABEL: FAILOVER ── -->
  <rect x="20" y="762" width="120" height="24" rx="5" fill="#ea580c"/>
  <text x="80" y="778" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">FAILOVER</text>
  <text x="158" y="778" font-size="11" fill="#64748b">created manually during failover — pick the latest READY-TO-USE ApplicationSnapshot</text>

  <!-- ApplicationSnapshotRestore -->
  <rect x="20" y="792" width="1060" height="56" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="550" y="814" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">ApplicationSnapshotRestore</text>
  <text x="550" y="832" text-anchor="middle" font-size="11" fill="#9a3412">ns: miriam-scuba-sealed (on target cluster) · references ApplicationSnapshot from miriam-backup-sealed · requires ⑥ to work</text>

</svg>
