<svg viewBox="0 0 1100 740" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>NKP Scuba Dive Log — v3 Demo Architecture</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="740" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">NKP Scuba Dive Log — v3 Demo Architecture</text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#64748b">Sealed Secrets · NDK Snapshot Replication · HAProxy Failover</text>

  <!-- ── ENTRY POINT ROW ── -->

  <!-- Browser -->
  <rect x="30" y="80" width="130" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="95" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Browser</text>
  <text x="95" y="122" text-anchor="middle" font-size="11" fill="#64748b">scubadivelog.online</text>

  <!-- arrow: browser → cloudflare -->
  <line x1="160" y1="108" x2="210" y2="108" stroke="#475569" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Cloudflare DNS -->
  <rect x="210" y="80" width="150" height="56" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.8"/>
  <text x="285" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">Cloudflare DNS</text>
  <text x="285" y="122" text-anchor="middle" font-size="11" fill="#9a3412">A → 10.54.27.138</text>

  <!-- arrow: cloudflare → haproxy -->
  <line x1="360" y1="108" x2="420" y2="108" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arr-orange)"/>

  <!-- HAProxy VM -->
  <rect x="420" y="72" width="260" height="72" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <text x="550" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">HAProxy  (active/passive LB)</text>
  <text x="550" y="116" text-anchor="middle" font-size="11" fill="#9a3412">miriams-nkp-bootstrap · 10.54.27.138</text>
  <text x="550" y="132" text-anchor="middle" font-size="10" fill="#9a3412">health-checks both ingresses · routes to alive cluster</text>

  <!-- arrow: haproxy → cluster A ingress -->
  <line x1="470" y1="144" x2="295" y2="200" stroke="#ea580c" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="348" y="178" text-anchor="middle" font-size="10" fill="#ea580c">primary</text>

  <!-- arrow: haproxy → cluster B ingress -->
  <line x1="630" y1="144" x2="805" y2="200" stroke="#ea580c" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="752" y="178" text-anchor="middle" font-size="10" fill="#ea580c">backup</text>

  <!-- ── CLUSTER A ── -->
  <rect x="20" y="200" width="500" height="430" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="270" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Cluster A — nkp-wlc-a</text>
  <rect x="160" y="232" width="80" height="22" rx="5" fill="#16a34a"/>
  <text x="200" y="247" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">ACTIVE</text>

  <!-- Traefik Ingress A -->
  <rect x="100" y="264" width="340" height="40" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="270" y="280" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Traefik Ingress</text>
  <text x="270" y="296" text-anchor="middle" font-size="10" fill="#166534">kommander-traefik · 10.38.48.141:443</text>

  <!-- arrow: traefik → app namespace -->
  <line x1="270" y1="304" x2="270" y2="322" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- miriam-scuba-sealed namespace A -->
  <rect x="50" y="322" width="440" height="190" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="270" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">ns: miriam-scuba-sealed</text>

  <!-- Frontend pod A -->
  <rect x="70" y="352" width="120" height="44" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="130" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Frontend</text>
  <text x="130" y="386" text-anchor="middle" font-size="10" fill="#1e40af">nginx · HTML/JS</text>

  <!-- Backend pod A -->
  <rect x="210" y="352" width="120" height="44" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="270" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Backend</text>
  <text x="270" y="386" text-anchor="middle" font-size="10" fill="#1e40af">FastAPI · Python</text>

  <!-- Sealed Secrets A -->
  <rect x="350" y="352" width="120" height="104" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.2"/>
  <text x="410" y="374" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">Sealed Secrets</text>
  <text x="410" y="390" text-anchor="middle" font-size="10" fill="#9d174d">controller +</text>
  <text x="410" y="406" text-anchor="middle" font-size="10" fill="#9d174d">encrypted CRDs</text>
  <text x="410" y="422" text-anchor="middle" font-size="10" fill="#9d174d">(committed</text>
  <text x="410" y="438" text-anchor="middle" font-size="10" fill="#9d174d">to git)</text>

  <!-- MySQL + PVC A -->
  <rect x="70" y="412" width="260" height="44" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="200" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">MySQL StatefulSet</text>
  <text x="200" y="446" text-anchor="middle" font-size="10" fill="#713f12">PVC: data-scuba-mysql-0 · nutanix-volume</text>

  <!-- miriam-backup-sealed namespace A -->
  <rect x="50" y="528" width="440" height="82" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="270" y="548" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">ns: miriam-backup-sealed</text>
  <text x="270" y="568" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">NDK — ApplicationSnapshot Source</text>
  <text x="270" y="586" text-anchor="middle" font-size="10" fill="#5b21b6">snapshots every ~60 min · replicates to Cluster B</text>
  <text x="270" y="600" text-anchor="middle" font-size="10" fill="#5b21b6">refgrant.yaml applied ✓</text>

  <!-- ── CLUSTER B ── -->
  <rect x="580" y="200" width="500" height="430" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="830" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Cluster B — nkp-wlc-b</text>
  <rect x="720" y="232" width="80" height="22" rx="5" fill="#94a3b8"/>
  <text x="760" y="247" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">STANDBY</text>

  <!-- Traefik Ingress B -->
  <rect x="660" y="264" width="340" height="40" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="830" y="280" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Traefik Ingress</text>
  <text x="830" y="296" text-anchor="middle" font-size="10" fill="#166534">kommander-traefik · 10.38.48.147:443</text>

  <!-- arrow: traefik → app namespace B -->
  <line x1="830" y1="304" x2="830" y2="322" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- miriam-scuba-sealed namespace B -->
  <rect x="610" y="322" width="440" height="190" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="830" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">ns: miriam-scuba-sealed</text>

  <!-- Frontend pod B -->
  <rect x="630" y="352" width="120" height="44" rx="6" fill="#86efac" stroke="#16a34a" stroke-width="1.2"/>
  <text x="690" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Frontend</text>
  <text x="690" y="386" text-anchor="middle" font-size="10" fill="#166534">nginx · HTML/JS</text>

  <!-- Backend pod B -->
  <rect x="770" y="352" width="120" height="44" rx="6" fill="#86efac" stroke="#16a34a" stroke-width="1.2"/>
  <text x="830" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Backend</text>
  <text x="830" y="386" text-anchor="middle" font-size="10" fill="#166534">FastAPI · Python</text>

  <!-- Sealed Secrets B -->
  <rect x="910" y="352" width="120" height="104" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.2"/>
  <text x="970" y="374" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">Sealed Secrets</text>
  <text x="970" y="390" text-anchor="middle" font-size="10" fill="#9d174d">controller +</text>
  <text x="970" y="406" text-anchor="middle" font-size="10" fill="#9d174d">encrypted CRDs</text>
  <text x="970" y="422" text-anchor="middle" font-size="10" fill="#9d174d">(committed</text>
  <text x="970" y="438" text-anchor="middle" font-size="10" fill="#9d174d">to git)</text>

  <!-- MySQL + PVC B -->
  <rect x="630" y="412" width="260" height="44" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="760" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">MySQL StatefulSet</text>
  <text x="760" y="446" text-anchor="middle" font-size="10" fill="#713f12">PVC: data-scuba-mysql-0 · nutanix-volume</text>

  <!-- miriam-backup-sealed namespace B -->
  <rect x="610" y="528" width="440" height="82" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="830" y="548" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">ns: miriam-backup-sealed</text>
  <text x="830" y="568" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">NDK — ApplicationSnapshot Target</text>
  <text x="830" y="586" text-anchor="middle" font-size="10" fill="#5b21b6">receives replicas from Cluster A</text>
  <text x="830" y="600" text-anchor="middle" font-size="10" fill="#5b21b6">refgrant.yaml applied ✓</text>

  <!-- ── NDK REPLICATION ARROW ── -->
  <rect x="492" y="536" width="116" height="18" rx="4" fill="#ede9fe"/>
  <text x="550" y="548" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">NDK replication</text>
  <line x1="490" y1="570" x2="610" y2="570" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arr-purple)"/>

  <!-- ── CI/CD ROW ── -->
  <rect x="20" y="648" width="1060" height="76" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="550" y="668" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">CI/CD  (git push to v3-sealed-secrets branch)</text>

  <!-- GitHub -->
  <rect x="50" y="676" width="130" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.2"/>
  <text x="115" y="694" text-anchor="middle" font-size="11" font-weight="600" fill="#f1f5f9">GitHub Actions</text>
  <text x="115" y="707" text-anchor="middle" font-size="10" fill="#94a3b8">deploy.yml</text>

  <!-- arrow -->
  <line x1="180" y1="694" x2="250" y2="694" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="215" y="688" text-anchor="middle" font-size="9" fill="#94a3b8">build</text>

  <!-- GHCR -->
  <rect x="250" y="676" width="130" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.2"/>
  <text x="315" y="694" text-anchor="middle" font-size="11" font-weight="600" fill="#f1f5f9">GHCR</text>
  <text x="315" y="707" text-anchor="middle" font-size="10" fill="#94a3b8">images :sha tag</text>

  <!-- arrow -->
  <line x1="380" y1="694" x2="450" y2="694" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="415" y="688" text-anchor="middle" font-size="9" fill="#94a3b8">push</text>

  <!-- Self-hosted runner -->
  <rect x="450" y="676" width="180" height="36" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1.2"/>
  <text x="540" y="694" text-anchor="middle" font-size="11" font-weight="600" fill="#f1f5f9">Self-hosted Runner</text>
  <text x="540" y="707" text-anchor="middle" font-size="10" fill="#94a3b8">bastion · helm upgrade</text>

  <!-- arrow to cluster A -->
  <line x1="630" y1="690" x2="710" y2="690" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="670" y="684" text-anchor="middle" font-size="9" fill="#60a5fa">deploy</text>

  <!-- Cluster A deploy target -->
  <rect x="710" y="676" width="140" height="36" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="780" y="694" text-anchor="middle" font-size="11" font-weight="600" fill="#bfdbfe">Cluster A</text>
  <text x="780" y="707" text-anchor="middle" font-size="10" fill="#93c5fd">miriam-scuba-sealed</text>

  <!-- Cluster B gets app via NDK restore, not CI/CD -->
  <rect x="870" y="676" width="200" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="970" y="694" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Cluster B</text>
  <text x="970" y="707" text-anchor="middle" font-size="10" fill="#64748b">restored via NDK on failover</text>

</svg>
