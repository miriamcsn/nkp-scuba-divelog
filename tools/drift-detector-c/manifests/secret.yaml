# Template — do not commit real credentials.
# Apply manually: kubectl apply -f secret.yaml -n kommander
apiVersion: v1
kind: Secret
metadata:
  name: prism-credentials
  namespace: kommander
type: Opaque
stringData:
  PRISM_ENDPOINT: "https://your-prism-central:9440"
  PRISM_USER: "your-user"
  PRISM_PASSWORD: "your-password"
