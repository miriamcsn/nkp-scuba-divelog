apiVersion: v1
kind: ServiceAccount
metadata:
  name: drift-detector
  namespace: kommander
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: drift-detector
rules:
  - apiGroups: ["infrastructure.cluster.x-k8s.io"]
    resources: ["nutanixmachines"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: drift-detector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: drift-detector
subjects:
  - kind: ServiceAccount
    name: drift-detector
    namespace: kommander
