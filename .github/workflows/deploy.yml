name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you also trigger manually from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: miriamcsn

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag from commit SHA
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for amd64 builds on any host arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/scuba-divelog-backend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/scuba-divelog-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/scuba-divelog-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/scuba-divelog-frontend:latest

  deploy:
    name: Deploy to NKP
    needs: build
    runs-on: [self-hosted, nkp]
    env:
      KUBECONFIG: /home/miriam/nkp-v2.17.1/miriams-nkp-cluster.conf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Helm upgrade
        run: |
          helm upgrade --install scuba ./deploy/charts/scuba-divelog \
            --namespace scuba \
            --create-namespace \
            --set backend.image.tag=${{ needs.build.outputs.tag }} \
            --set frontend.image.tag=${{ needs.build.outputs.tag }} \
            --wait \
            --timeout 5m

      - name: Show resulting pods
        run: kubectl -n scuba get pods,svc,ingress