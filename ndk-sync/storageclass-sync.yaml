apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nutanix-volume-sync
provisioner: csi.nutanix.com
parameters:
  storageType: NutanixVolumes
  # ⚠️ TODO: confirm with Nutanix admin before applying
  # The following parameters depend on your Prism Central Metro Availability config:
  # - storageContainer: name of the Metro-enabled storage container on Prism Element
  # - replicationType: MetroAvailability (exact value may vary by CSI version)
  #
  # Example (verify with admin):
  # storageContainer: "default-container-metro"
  # replicationType: "MetroAvailability"
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: Immediate
