# Image registry + pull policy shared by both components
image:
  registry: ghcr.io/miriamcsn
  pullPolicy: IfNotPresent

# Backend: FastAPI + SQLite, single replica because SQLite is single-writer
backend:
  image:
    repository: scuba-divelog-backend
    tag: "0.1.0"
  replicaCount: 1
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
  # v2 uses MySQL for state — no per-pod PVC needed.
  # The PVC the customer cares about lives on the mysql sub-chart's StatefulSet
  # (see mysql.primary.persistence below), which is what NDK protects.
    enabled: false
    size: 1Gi
    storageClassName: nutanix-volume
    mountPath: /data

# Frontend: nginx serving static HTML + proxying /api to the backend
frontend:
  image:
    repository: scuba-divelog-frontend
    tag: "0.1.0"
  replicaCount: 2
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Ingress (Traefik via NKP Kommander)
ingress:
  enabled: true
  className: kommander-traefik
  host: ""            # leave empty to match any host (we'll hit the LoadBalancer IP directly)
  path: /
  pathType: Prefix

# Bitnami MySQL sub-chart config
mysql:
  enabled: true
  architecture: standalone   # single primary, no replicas — keeps demo simple
  auth:
    rootPassword: "rootpw"          # let chart generate; we'll override for demo predictability
    database: divelog
    username: divelog
    password: "divelog"       # demo password; in prod use existingSecret
  primary:
    persistence:
      enabled: true
      storageClass: nutanix-volume
      size: 5Gi                # set this to a size your NDK policy will replicate fast enough
      # IMPORTANT for NDK: don't set existingClaim — let the StatefulSet's
      # volumeClaimTemplate create a fresh PVC named data-scuba-mysql-0.
      # NDK protection policies target PVCs (or namespaces); a templated PVC
      # with a predictable name makes the policy trivial to write.    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi