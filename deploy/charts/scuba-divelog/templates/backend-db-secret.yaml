{{- if .Values.mysql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-app-db
  labels:
    {{- include "scuba-divelog.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "mysql+pymysql://{{ .Values.mysql.auth.username }}:{{ .Values.mysql.auth.password }}@{{ .Release.Name }}-mysql:3306/{{ .Values.mysql.auth.database }}"
{{- end }}